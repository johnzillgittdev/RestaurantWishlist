name: iOS Build (Simulator)

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-

      - name: Cache MAUI workload
        id: cache-maui
        uses: actions/cache@v4
        with:
          path: |
            ~/.dotnet/workloads
            /usr/local/share/dotnet/sdk-manifests
            /usr/local/share/dotnet/packs
          key: maui-workload-${{ runner.os }}-net10

      - name: Install MAUI iOS workload
        if: steps.cache-maui.outputs.cache-hit != 'true'
        run: dotnet workload install maui-ios

      - name: Restore dependencies
        run: dotnet restore RestaurantWishlist/RestaurantWishlist.csproj -f net10.0-ios

      - name: Build iOS (simulator)
        run: |
          dotnet build RestaurantWishlist/RestaurantWishlist.csproj \
            -f net10.0-ios \
            -c Release \
            /p:RuntimeIdentifier=iossimulator-x64 \
            /p:CodesignKey="" \
            /p:CodesignProvision=""

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-build
          path: RestaurantWishlist/bin/Release/net10.0-ios/iossimulator-x64/
          retention-days: 7
